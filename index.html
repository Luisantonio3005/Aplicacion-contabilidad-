<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Aplicación de Contabilidad con Cuentas T - Registra cuentas, transacciones de débito y crédito, y visualiza estados financieros en tiempo real." />
  <meta name="theme-color" content="#2563eb" />
  <title>Contabilidad con Cuentas T</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    }

    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #4b5563;
      --text-tertiary: #6b7280;
      --border-color: #e5e7eb;
      --table-header-bg: #f3f4f6;
      --table-row-even-bg: #f9fafb;
      --input-bg: #ffffff;
      --input-border: #d1d5db;
      --input-text: #1f2937;
      --input-placeholder: #9ca3af;
      --button-primary: #2563eb;
      --button-primary-hover: #1d4ed8;
      --button-danger: #ef4444;
      --button-danger-hover: #dc2626;
      --card-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      --summary-bg: #f0f9ff;
      --summary-border: #bfdbfe;
      --summary-text: #1e40af;
      --income-bg: #f0fdf4;
      --income-border: #bbf7d0;
      --income-text: #166534;
      --theme-btn-border: #d1d5db;
      --theme-btn-hover: #f3f4f6;
      --theme-btn-text: #4b5563;
    }

    html[data-theme="dark"] {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --border-color: #334155;
      --table-header-bg: #0f172a;
      --table-row-even-bg: #1a2332;
      --input-bg: #0f172a;
      --input-border: #475569;
      --input-text: #f1f5f9;
      --input-placeholder: #64748b;
      --button-primary: #3b82f6;
      --button-primary-hover: #2563eb;
      --button-danger: #ef4444;
      --button-danger-hover: #dc2626;
      --card-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.3);
      --summary-bg: #0c2340;
      --summary-border: #1e3a8a;
      --summary-text: #93c5fd;
      --income-bg: #0c2818;
      --income-border: #166534;
      --income-text: #86efac;
      --theme-btn-border: #475569;
      --theme-btn-hover: #1e293b;
      --theme-btn-text: #cbd5e1;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    h1, h2, h3, h4, h5, h6 {
      color: var(--text-primary);
      transition: color 0.3s ease;
    }

    p {
      color: var(--text-secondary);
      transition: color 0.3s ease;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      transition: all 0.3s ease;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      gap: 1rem;
    }

    .header-content h1 {
      font-size: 2.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .header-content p {
      font-size: 1rem;
      line-height: 1.6;
    }

    .theme-toggle {
      padding: 0.75rem;
      border: 1px solid var(--theme-btn-border);
      background-color: var(--bg-secondary);
      color: var(--theme-btn-text);
      border-radius: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .theme-toggle:hover {
      background-color: var(--theme-btn-hover);
      border-color: var(--button-primary);
    }

    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--card-shadow);
      transition: all 0.3s ease;
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    input, select {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid var(--input-border);
      background-color: var(--input-bg);
      color: var(--input-text);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    input::placeholder, select {
      color: var(--input-placeholder);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--button-primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    html[data-theme="dark"] input:focus,
    html[data-theme="dark"] select:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    button {
      padding: 0.625rem 1rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background-color: var(--button-primary);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      background-color: var(--button-primary-hover);
    }

    .btn-danger {
      background-color: var(--button-danger);
      color: white;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      width: auto;
    }

    .btn-danger:hover {
      background-color: var(--button-danger-hover);
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th {
      background-color: var(--table-header-bg);
      color: var(--text-primary);
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      border: 1px solid var(--border-color);
      transition: all 0.3s ease;
    }

    td {
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    tbody tr:nth-child(even) {
      background-color: var(--table-row-even-bg);
    }

    tbody tr:hover {
      background-color: var(--table-row-even-bg);
    }

    .summary-box {
      background-color: var(--summary-bg);
      border: 1px solid var(--summary-border);
      color: var(--summary-text);
      padding: 1rem;
      border-radius: 0.5rem;
      margin-top: 1rem;
      transition: all 0.3s ease;
    }

    .summary-box div {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .summary-box div:last-child {
      margin-bottom: 0;
    }

    .account-card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      padding: 1rem;
      transition: all 0.3s ease;
    }

    .account-card h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .account-card .small {
      font-size: 0.875rem;
      font-weight: 400;
    }

    .account-card p {
      margin: 0.25rem 0;
      font-size: 0.875rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .income-card {
      background-color: var(--income-bg);
      border: 1px solid var(--income-border);
      color: var(--income-text);
      padding: 1.5rem;
      border-radius: 0.75rem;
      transition: all 0.3s ease;
    }

    .income-card h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--income-text);
    }

    .income-card .stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }

    .income-card .stat:last-child {
      margin-bottom: 0;
    }

    .income-card .divider {
      border-top: 1px solid var(--income-border);
      padding-top: 0.75rem;
      margin-top: 0.75rem;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .header {
        flex-direction: column;
      }

      .header-content h1 {
        font-size: 1.875rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.85rem;
      }

      th, td {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="module">
    // Importar la aplicación React compilada
    import('./client/dist/index.js').catch(err => {
      console.error('Error loading app:', err);
      document.body.innerHTML = '<div style="padding: 2rem; text-align: center;"><h1>Error al cargar la aplicación</h1><p>Por favor, asegúrate de que la aplicación ha sido compilada correctamente.</p></div>';
    });
  </script>
</body>
</html>
